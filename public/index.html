<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Socket.IO Client</title>
        <style>
            body {
                margin: 0;
                padding-bottom: 3rem;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
            }

            .form {
                background: rgba(0, 0, 0, 0.15);
                padding: 0.25rem;
                bottom: 0;
                left: 0;
                right: 0;
                display: flex;
                height: 3rem;
                box-sizing: border-box;
                backdrop-filter: blur(10px);
            }
            #input {
                border: none;
                padding: 0 1rem;
                flex-grow: 1;
                border-radius: 2rem;
                margin: 0.25rem;
            }
            #input:focus {
                outline: none;
            }
            .form > button {
                background: #333;
                border: none;
                padding: 0 1rem;
                margin: 0.25rem;
                border-radius: 3px;
                outline: none;
                color: #fff;
            }

            #messages {
                list-style-type: none;
                margin: 0;
                padding: 0;
            }
            #messages > li {
                padding: 0.5rem 1rem;
            }
            #messages > li:nth-child(odd) {
                background: #efefef;
            }
        </style>
        <script src="/socket.io/socket.io.js"></script>
    </head>
    <body>
        <h1>Spillr Socket Test</h1>
        <ul id="messages"></ul>
        <form class="form" id="comment-form" action="">
            <label for="comment">Comment:</label>
            <input id="comment" autocomplete="off" />
            <button type="submit">Send</button>
        </form>
        <form class="form" id="reply-form" action="">
            <label for="reply">Reply:</label>
            <input id="reply" autocomplete="off" />
            <button type="submit">Send</button>
        </form>
    </body>
    <script>
        const socket = io();
        const messages = document.getElementById("messages");

        const commentForm = document.getElementById("comment-form");
        const commentInput = document.getElementById("comment");
        const comment = {
            episode_id: 469092,
            user_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
            runtime_seconds: 1,
            is_spoiler: false,
            // is_live: true,
        };

        commentForm.addEventListener("submit", (e) => {
            e.preventDefault();
            // socket.emit("room:join", 3129600);
            if (commentInput.value) {
                comment.body = commentInput.value;
                console.log("client sends:", comment);
                socket.emit("comment:post", comment);
                commentInput.value = "";
            }
        });

        const replyForm = document.getElementById("reply-form");
        const replyInput = document.getElementById("reply");
        const reply = {
            comment_id: 1,
            episode_id: 3129600,
            user_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901",
            runtime_seconds: 2,
        };

        replyForm.addEventListener("submit", (e) => {
            e.preventDefault();
            if (replyInput.value) {
                reply.body = replyInput.value;
                console.log("client sends reply:", reply);
                socket.emit("reply:post", reply);
                replyInput.value = "";
            }
        });

        socket.on("comment:new", (msg) => {
            console.log("received comment from server:", msg);
            const item = document.createElement("li");
            item.textContent = msg;
            messages.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });

        socket.on("reply:new", (msg) => {
            console.log("received reply from server:", msg);
            const item = document.createElement("li");
            item.textContent = msg;
            messages.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });
    </script>
</html>
