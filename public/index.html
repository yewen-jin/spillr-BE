<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Socket.IO Client</title>
        <style>
            body {
                margin: 0;
                padding-bottom: 3rem;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
            }

            #form {
                background: rgba(0, 0, 0, 0.15);
                padding: 0.25rem;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                display: flex;
                height: 3rem;
                box-sizing: border-box;
                backdrop-filter: blur(10px);
            }
            #input {
                border: none;
                padding: 0 1rem;
                flex-grow: 1;
                border-radius: 2rem;
                margin: 0.25rem;
            }
            #input:focus {
                outline: none;
            }
            #form > button {
                background: #333;
                border: none;
                padding: 0 1rem;
                margin: 0.25rem;
                border-radius: 3px;
                outline: none;
                color: #fff;
            }

            #messages {
                list-style-type: none;
                margin: 0;
                padding: 0;
            }
            #messages > li {
                padding: 0.5rem 1rem;
            }
            #messages > li:nth-child(odd) {
                background: #efefef;
            }
        </style>
        <script src="/socket.io/socket.io.js"></script>
    </head>
    <body>
        <h1>Spillr Socket Test</h1>
        <ul id="messages"></ul>
        <form id="form" action="">
            <input id="input" autocomplete="off" />
            <button type="submit">Send</button>
        </form>
    </body>
    <script>
        const socket = io();
        const form = document.getElementById("form");
        const input = document.getElementById("input");
        const comment = {};
        const messages = document.getElementById("messages");

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            if (input.value) {
                comment.body = input.value;
                comment.episode_id = 3129600;
                comment.user_id = "a1b2c3d4-e5f6-7890-abcd-ef1234567890";
                comment.runtime_seconds = 1;
                comment.is_spoiler = false;
                console.log("client sends:", comment);
                socket.emit("comment", comment);
                input.value = "";
            }
        });

        socket.on("comment", (msg) => {
            console.log("received message from server:", msg);
            const item = document.createElement("li");
            item.textContent = msg;
            messages.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });
    </script>
</html>
